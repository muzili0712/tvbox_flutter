name: tvbox_flutter
description: TVBox Flutter 100% 完整复刻版
version: 1.4.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.41.6'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  json_annotation: ^4.9.0
  cached_network_image: ^3.3.1
  flutter_vlc_player: ^7.4.1
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  flutter_spinkit: ^5.2.1
  pull_to_refresh: ^2.0.0
  fluttertoast: ^8.2.5
  url_launcher: ^6.2.6
  package_info_plus: ^6.0.0
  device_info_plus: ^10.1.0
  video_player: ^2.8.6
  chewie: ^1.7.5
  file_picker: ^8.0.3
  open_file: ^3.3.2
  flutter_local_notifications: ^17.1.2
  share_plus: ^9.0.0
  clipboard: ^0.1.3
  webview_flutter: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - nodejs-project/dist/
    - assets/images/
    - assets/icons/
