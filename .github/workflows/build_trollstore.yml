name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code (without LFS to avoid quota issues)
        uses: actions/checkout@v4
        with:
          lfs: false   # 禁用LFS，稍后手动下载框架

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Download NodeMobile.xcframework
        run: |
          echo "=== 下载 NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          cd ios/Frameworks
    
          # 删除可能存在的旧文件
          rm -rf NodeMobile.xcframework
    
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o nodejs-mobile.zip "$DOWNLOAD_URL"
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
    
          if [ ! -d "NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework 未找到"
            exit 1
          fi
          echo "✅ 下载完成"
          cd ../..
          
          echo "=== 验证框架 ==="
          ls -la ios/Frameworks/NodeMobile.xcframework
          file ios/Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/NodeMobile

      - name: Build Node.js Project
        run: |
          echo "=== 构建 Node.js 运行时 ==="
          cd nodejs-project
          npm install
          npm run build
          cd ..
          echo "✅ 打包完成"
          ls -la nodejs-project/dist/

      - name: Install Flutter Dependencies & Generate JSON Code
        run: |
          echo "=== 安装 Flutter 依赖 ==="
          flutter pub get
          echo "=== 生成 JSON 序列化代码 ==="
          dart run build_runner build --delete-conflicting-outputs

      - name: Install iOS Pods
        run: |
          echo "=== 安装 CocoaPods ==="
          cd ios
          pod install --repo-update
          cd ..

      - name: Build TVBox (TrollStore)
        run: |
          echo "=== 使用 Flutter 构建完整 .app ==="
          flutter pub get
          flutter build ios --release --no-codesign
          
          APP_PATH="./build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Flutter 构建失败：未找到 Runner.app"
            exit 1
          fi
          
          echo "✅ Flutter 构建成功，.app 大小: $(du -sh "$APP_PATH" | cut -f1)"
          
          # 修复权限和 Info.plist 确保 TrollStore 兼容
          echo "=== 修复二进制文件权限 ==="
          chmod +x "$APP_PATH/Runner"
          
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" "$APP_PATH/Info.plist" 2>/dev/null || echo "")
          echo "当前 CFBundleExecutable 值为: $EXEC_NAME"
          if [ "$EXEC_NAME" != "Runner" ]; then
            echo "⚠️ CFBundleExecutable 不匹配，强制设置为 'Runner'"
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Runner" "$APP_PATH/Info.plist"
          fi
          
          echo "=== 打包 TrollStore IPA ==="
          mkdir -p ./Build
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          cd "$TEMP_DIR"
          zip -r "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPA 已生成: ./Build/tvbox-Flutter-TrollStore.ipa"
          ls -lh ./Build/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: ./Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./ios/build.log
          retention-days: 7
