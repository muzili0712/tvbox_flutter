name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Download and Setup NodeMobile.xcframework
        run: |
          echo "=== Downloading NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          cd ios/Frameworks
          rm -rf NodeMobile.xcframework nodejs-mobile.zip
          
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o nodejs-mobile.zip "$DOWNLOAD_URL"
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          
          if [ ! -d "NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework not found"
            exit 1
          fi
          
          echo "✅ NodeMobile.xcframework downloaded"
          
          echo "=== Fixing Info.plist if needed ==="
          FRAMEWORK_PATH="ios/Frameworks/NodeMobile.xcframework"
          
          plutil -lint "$FRAMEWORK_PATH/Info.plist" > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "Regenerating Info.plist..."
            PLIST='<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>AvailableLibraries</key><array><dict><key>BinaryPath</key><string>NodeMobile.framework/NodeMobile</string><key>LibraryIdentifier</key><string>ios-arm64</string><key>LibraryPath</key><string>NodeMobile.framework</string><key>SupportedArchitectures</key><array><string>arm64</string></array><key>SupportedPlatform</key><string>ios</string></dict></array><key>CFBundlePackageType</key><string>XFWK</string><key>XCFrameworkFormatVersion</key><string>1.0</string></dict></plist>'
            echo "$PLIST" > "$FRAMEWORK_PATH/Info.plist"
            plutil -lint "$FRAMEWORK_PATH/Info.plist"
            echo "✅ Info.plist fixed"
          else
            echo "✅ Info.plist is valid"
          fi

      - name: Clean Flutter Build
        run: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf build

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build with Flutter
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Find .app Bundle
        id: find_app
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Fix Bundle and Clean Signing
        run: |
          APP_PATH="${{ steps.find_app.outputs.app_path }}"
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Error: App bundle not found"
            exit 1
          fi

          echo "Cleaning signature files..."
          rm -rf "$APP_PATH/_CodeSignature"
          rm -rf "$APP_PATH/embedded.mobileprovision"

          echo "Fixing Info.plist..."
          PLIST="$APP_PATH/Info.plist"
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.example.tvboxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.4.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$PLIST"
          
          if ! /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST" > /dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
          fi

          echo "Final Info.plist:"
          plutil -p "$PLIST"

      - name: Create IPA
        run: |
          APP_PATH="${{ steps.find_app.outputs.app_path }}"
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          mkdir -p Build
          cd "$TEMP_DIR"
          zip -r -q -X "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"

          echo "IPA created successfully!"
          ls -lh Build/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30
