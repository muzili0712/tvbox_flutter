name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Download and Setup NodeMobile.xcframework
        run: |
          set -e
          echo "=== Downloading NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks

          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o ios/Frameworks/nodejs-mobile.zip "$DOWNLOAD_URL"
          cd ios/Frameworks
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          cd ../..

          if [ ! -d "ios/Frameworks/NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework not found"
            exit 1
          fi

          echo "✅ NodeMobile.xcframework downloaded"

      - name: Build Node.js Project
        run: |
          set -e
          echo "=== Building Node.js project ==="
          cd ios/Runner/nodejs-project

          if [ ! -d "node_modules" ]; then
            npm install 2>&1 | tail -3
          fi

          node esbuild.js 2>&1
          node esbuild-config.js 2>&1

          if [ -d "dist" ] && [ -f "dist/index.js" ] && [ -f "dist/index.config.js" ]; then
            echo "✅ Node.js build successful"
            echo "   Output: dist/index.js, dist/index.config.js"
            ls -la dist/
          else
            echo "❌ Build failed - missing output files"
            exit 1
          fi

      - name: Configure Xcode Code Signing
        run: |
          set -e
          echo "=== Configuring Xcode code signing for TrollStore build ==="

          cd ios

          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/' Runner.xcodeproj/project.pbxproj

          /usr/libexec/PlistBuddy -c "Set :objects:97C147071CF9000F007C117D:buildSettings:DEVELOPMENT_TEAM 0000000000" Runner.xcodeproj/project.pbxproj 2>/dev/null || \
          python3 -c "
          import re, sys
          with open('Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          # Add DEVELOPMENT_TEAM to Release config (97C147071CF9000F007C117D)
          content = re.sub(
              r'(97C147071CF9000F007C117D /\* Release \*/ = \{.*?buildSettings = \{)',
              r'\1\n\t\t\t\tDEVELOPMENT_TEAM = 0000000000;',
              content,
              flags=re.DOTALL
          )
          # Add DEVELOPMENT_TEAM to Profile config (249021D4217E4FDB00AE95B9)
          content = re.sub(
              r'(249021D4217E4FDB00AE95B9 /\* Profile \*/ = \{.*?buildSettings = \{)',
              r'\1\n\t\t\t\tDEVELOPMENT_TEAM = 0000000000;',
              content,
              flags=re.DOTALL
          )
          # Add DEVELOPMENT_TEAM to Debug config (97C147061CF9000F007C117D)
          content = re.sub(
              r'(97C147061CF9000F007C117D /\* Debug \*/ = \{.*?buildSettings = \{)',
              r'\1\n\t\t\t\tDEVELOPMENT_TEAM = 0000000000;',
              content,
              flags=re.DOTALL
          )
          with open('Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print('DEVELOPMENT_TEAM set to 0000000000')
          "

          echo "✅ Code signing configured for TrollStore build"

      - name: Build iOS App
        run: |
          set -e
          echo "=== Building iOS app ==="

          flutter pub get

          cd ios
          pod install --repo-update

          cd ..
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Copy Node.js files to App Bundle
        run: |
          set -e
          echo "=== Copying Node.js files to App Bundle ==="

          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ App bundle not found"
            exit 1
          fi

          echo "Found app: $APP_PATH"

          mkdir -p "$APP_PATH/nodejs-project/dist"
          cp ios/Runner/nodejs-project/dist/index.js "$APP_PATH/nodejs-project/dist/"
          cp ios/Runner/nodejs-project/dist/index.js.md5 "$APP_PATH/nodejs-project/dist/" 2>/dev/null || true
          cp ios/Runner/nodejs-project/dist/index.config.js "$APP_PATH/nodejs-project/dist/"
          cp ios/Runner/nodejs-project/dist/index.config.js.md5 "$APP_PATH/nodejs-project/dist/" 2>/dev/null || true

          echo "✅ Node.js files copied to app bundle"
          ls -la "$APP_PATH/nodejs-project/dist/"

      - name: Prepare IPA
        id: prepare
        run: |
          echo "=== Preparing IPA ==="

          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ App bundle not found"
            exit 1
          fi

          echo "Found app: $APP_PATH"

          rm -rf "$APP_PATH/_CodeSignature"
          rm -rf "$APP_PATH/embedded.mobileprovision"
          rm -rf "$APP_PATH/CodeResources" 2>/dev/null || true

          echo "✅ Code signature removed"

          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"

          mkdir -p Build
          cd "$TEMP_DIR"
          zip -r -q -X "$GITHUB_WORKSPACE/Build/TvBoxFlutter.ipa" Payload

          echo "✅ IPA created"
          ls -lh "$GITHUB_WORKSPACE/Build/TvBoxFlutter.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TvBoxFlutter-TrollStore
          path: Build/TvBoxFlutter.ipa
          retention-days: 30
