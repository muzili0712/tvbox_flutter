name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Download NodeMobile.xcframework
        run: |
          echo "=== Downloading NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          cd ios/Frameworks
          rm -rf NodeMobile.xcframework
          
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o nodejs-mobile.zip "$DOWNLOAD_URL"
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          
          if [ ! -d "NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework not found after extraction"
            exit 1
          fi
          
          echo "✅ NodeMobile.xcframework downloaded"
          ls -la

      - name: Validate NodeMobile.xcframework
        run: |
          echo "=== Validating NodeMobile.xcframework ==="
          FRAMEWORK_PATH="ios/Frameworks/NodeMobile.xcframework"
          
          if [ ! -f "$FRAMEWORK_PATH/Info.plist" ]; then
            echo "❌ Info.plist not found"
            exit 1
          fi
          
          echo "Validating Info.plist format..."
          plutil -lint "$FRAMEWORK_PATH/Info.plist"
          if [ $? -ne 0 ]; then
            echo "❌ Invalid Info.plist format, generating new one..."
            
            INFO_PLIST_B64="PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0iVVRGLTgiPz4KPCFET0NUWVBFIHNwbGljZXMgcHVibGljICItLy9BcHBsZS8vRFREIFBM
SVNUIDEuMC8vRU4iICJodHRwOi8vd3d3LmFwcGxlLmNvbS9EVEQvUHJvcGVydHktMS4wL01EIiA/Pgo8cGxpc3QgdmVyc2lvbj0iMS4wIj4K
PGRpY3Q+Cgk8a2V5PkF2YWlsYWJsZUxpYnJhcmllczA8L2tleT4KCTxhcnJheT4KCQk8ZGljdD4KCQkJPGtleT5CaW5hcnlQYXRo
PC9rZXk+CgkJCTxzdHJpbmc+Tm9kZU1vYmlsZS5mcmFtZXdvcmsvTm9kZU1vYmlsZTwvc3RyaW5nPgoJCQk8a2V5PkxpYnJhcnlJ
ZGVudGlmaWVyPC9rZXk+CgkJCTxzdHJpbmc+aW9zLWFybTY0PC9zdHJpbmc+CgkJCTxrZXk+TGlicmFyeVBhdGg8L2tleT4KCQkJ
PHN0cmluZz5Ob2RlTW9iaWxlLmZyYW1ld29yazwvc3RyaW5nPgoJCQk8a2V5PlN1cHBvcnRlZEFyY2hpdGVjdHVyZXM8L2tleT4K
CQkJPHN0cmluZz5hcm02NDwvc3RyaW5nPgoJCQk8a2V5PlN1cHBvcnRlZFBsYXRmb3JtPC9rZXk+CgkJCTxzdHJpbmc+aW9zPC9z
dHJpbmc+CgkJPC9kaWN0PgoJPC9hcnJheT4KCTxrZXk+Q0ZCdW5kbGVQYWNrYWdlVHlwZTwva2V5PgoJPHN0cmluZz5YRldSSzwv
c3RyaW5nPgoJPGtleT5YQ0ZyYW1ld29ya0Zvcm1hdFZlcnNpb248L2tleT4KCTxzdHJpbmc+MS4wPC9zdHJpbmc+CjwvZGljdD4K
PC9wbGlzdD4K"
            
            echo "$INFO_PLIST_B64" | base64 -d > "$FRAMEWORK_PATH/Info.plist"
            
            plutil -lint "$FRAMEWORK_PATH/Info.plist"
            if [ $? -eq 0 ]; then
              echo "✅ Info.plist generated successfully"
            else
              echo "❌ Failed to generate Info.plist"
              exit 1
            fi
          else
            echo "✅ Info.plist is valid"
          fi

      - name: Clean Flutter Build
        run: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf build

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build with Flutter
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Find .app Bundle
        id: find_app
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Fix Bundle and Clean Signing
        run: |
          APP_PATH="${{ steps.find_app.outputs.app_path }}"
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Error: App bundle not found"
            exit 1
          fi

          echo "Cleaning signature files..."
          rm -rf "$APP_PATH/_CodeSignature"
          rm -rf "$APP_PATH/embedded.mobileprovision"

          echo "Fixing Info.plist..."
          PLIST="$APP_PATH/Info.plist"
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.example.tvboxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.4.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$PLIST"
          
          if ! /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST" > /dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
          fi

          echo "Final Info.plist:"
          plutil -p "$PLIST"

      - name: Create IPA
        run: |
          APP_PATH="${{ steps.find_app.outputs.app_path }}"
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          mkdir -p Build
          cd "$TEMP_DIR"
          zip -r -q -X "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"

          echo "IPA created successfully!"
          ls -lh Build/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30
