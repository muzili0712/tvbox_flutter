name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Download and Setup NodeMobile.xcframework
        run: |
          set -e
          echo "=== Downloading NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o ios/Frameworks/nodejs-mobile.zip "$DOWNLOAD_URL"
          cd ios/Frameworks
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          cd ../..
          
          if [ ! -d "ios/Frameworks/NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework not found"
            exit 1
          fi
          
          echo "✅ NodeMobile.xcframework downloaded"
          ls -la ios/Frameworks
          
          FRAMEWORK_PATH="ios/Frameworks/NodeMobile.xcframework"
          
          if [ -f "$FRAMEWORK_PATH/Info.plist" ]; then
            echo "Checking Info.plist..."
            if plutil -lint "$FRAMEWORK_PATH/Info.plist" > /dev/null 2>&1; then
              echo "✅ Info.plist is valid"
            else
              echo "⚠️ Info.plist is invalid, creating new one..."
              python3 -c "import plistlib; plistlib.dump({'AvailableLibraries': [{'BinaryPath': 'NodeMobile.framework/NodeMobile', 'LibraryIdentifier': 'ios-arm64', 'LibraryPath': 'NodeMobile.framework', 'SupportedArchitectures': ['arm64'], 'SupportedPlatform': 'ios'}], 'CFBundlePackageType': 'XFWK', 'XCFrameworkFormatVersion': '1.0'}, open('ios/Frameworks/NodeMobile.xcframework/Info.plist', 'wb'))"
              if plutil -lint "$FRAMEWORK_PATH/Info.plist" > /dev/null 2>&1; then
                echo "✅ Info.plist created successfully"
              else
                echo "❌ Failed to create Info.plist"
                exit 1
              fi
            fi
          else
            echo "⚠️ Info.plist not found, creating new one..."
            python3 -c "import plistlib; plistlib.dump({'AvailableLibraries': [{'BinaryPath': 'NodeMobile.framework/NodeMobile', 'LibraryIdentifier': 'ios-arm64', 'LibraryPath': 'NodeMobile.framework', 'SupportedArchitectures': ['arm64'], 'SupportedPlatform': 'ios'}], 'CFBundlePackageType': 'XFWK', 'XCFrameworkFormatVersion': '1.0'}, open('ios/Frameworks/NodeMobile.xcframework/Info.plist', 'wb'))"
            if plutil -lint "$FRAMEWORK_PATH/Info.plist" > /dev/null 2>&1; then
              echo "✅ Info.plist created successfully"
            else
              echo "❌ Failed to create Info.plist"
              exit 1
            fi
          fi

      - name: Build Node.js Project
        run: |
          set -e
          echo "=== Building Node.js project ==="
          
          cd ios/Runner/nodejs-project
          
          # Install dependencies if needed
          if [ ! -d "node_modules" ]; then
            echo "Installing npm dependencies..."
            npm install 2>&1 | tail -5
          fi
          
          # Build the project
          echo "Building with esbuild..."
          node build-optimized.js 2>&1 || node build.js 2>&1
          
          # Check if dist was created
          if [ -d "dist" ]; then
            echo "✅ Node.js build successful"
            ls -la dist/
            
            # Create main.js as entry point
            if [ -f "dist/index.js" ]; then
              cp dist/index.js dist/main.js
              echo "✅ main.js created"
            fi
          else
            echo "❌ dist directory not created"
            exit 1
          fi

      - name: Clean Flutter Build
        run: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf build

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build with Flutter
        run: |
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Find .app Bundle
        id: find_app
        run: |
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Fix Bundle and Clean Signing
        run: |
          APP_PATH="${{ steps.find_app.outputs.app_path }}"
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Error: App bundle not found"
            exit 1
          fi

          echo "Cleaning signature files..."
          rm -rf "$APP_PATH/_CodeSignature"
          rm -rf "$APP_PATH/embedded.mobileprovision"

          echo "Fixing Info.plist..."
          PLIST="$APP_PATH/Info.plist"
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.example.tvboxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.4.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$PLIST"
          
          if ! /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST" > /dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"
          else
            /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST"
          fi

          echo "Final Info.plist:"
          plutil -p "$PLIST"

      - name: Create IPA
        run: |
          APP_PATH="${{ steps.find_app.outputs.app_path }}"
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          mkdir -p Build
          cd "$TEMP_DIR"
          zip -r -q -X "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"

          echo "IPA created successfully!"
          ls -lh Build/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30
