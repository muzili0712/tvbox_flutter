name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Install xcodeproj (Ruby gem)
        run: gem install xcodeproj

      - name: Verify NodeMobile Framework (from LFS)
        run: |
          echo "=== 验证 Git LFS 中的 NodeMobile 框架 ==="
          FRAMEWORK_PATH="ios/Frameworks/NodeMobile.xcframework"
          if [ ! -d "$FRAMEWORK_PATH" ]; then
            echo "❌ 错误：未找到 NodeMobile.xcframework"
            exit 1
          fi
          if [ -f "$FRAMEWORK_PATH/ios-arm64/NodeMobile.framework/NodeMobile" ]; then
            echo "✅ NodeMobile 二进制存在"
          else
            echo "❌ NodeMobile 二进制缺失"
            exit 1
          fi

      - name: Analyze NodeMobile Symbols
        run: |
          echo "=== 分析 NodeMobile 框架导出的符号 ==="
          FRAMEWORK_BIN="ios/Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/NodeMobile"
          
          echo "1. 查找消息通信相关符号："
          SYMBOLS=(
            "node_register_message_callback"
            "node_send_message"
            "node_start"
            "node_stop"
            "node_channel"
            "NodeChannel"
            "setMessageCallback"
            "sendMessage"
          )
          
          for sym in "${SYMBOLS[@]}"; do
            if nm -gU "$FRAMEWORK_BIN" 2>/dev/null | grep -q "$sym"; then
              echo "   ✅ 找到: $sym"
            else
              echo "   ❌ 未找到: $sym"
            fi
          done
          
          echo ""
          echo "2. 列出所有导出的 Objective-C 类："
          nm -gU "$FRAMEWORK_BIN" 2>/dev/null | grep " _OBJC_CLASS_\$_" | sed 's/.* _OBJC_CLASS_\$_//' || echo "   无 Objective-C 类"
          
          echo ""
          echo "3. 列出所有导出的 C 函数（过滤 node_ 开头）："
          nm -gU "$FRAMEWORK_BIN" 2>/dev/null | grep " T _node_" | sed 's/.* T _//' || echo "   无 node_ 开头的 C 函数"
          
          echo ""
          echo "4. 检查框架内是否有 Swift 模块接口："
          if [ -f "ios/Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/Modules/NodeMobile.swiftmodule/arm64-apple-ios.swiftinterface" ]; then
            echo "   ✅ 存在 Swift 模块接口"
            head -20 "ios/Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/Modules/NodeMobile.swiftmodule/arm64-apple-ios.swiftinterface"
          else
            echo "   ❌ 没有 Swift 模块接口"
          fi
        shell: bash

      - name: Build Node.js Project
        run: |
          echo "=== 构建 Node.js 运行时 ==="
          cd nodejs-project
          npm install
          npm run build
          cd ..
          echo "✅ 打包完成"
          ls -la nodejs-project/dist/

      - name: Install Flutter Dependencies & Generate JSON Code
        run: |
          echo "=== 安装 Flutter 依赖 ==="
          flutter pub get
          echo "=== 生成 JSON 序列化代码 ==="
          dart run build_runner build --delete-conflicting-outputs

      - name: Add NodeJSBridge.swift to Xcode project
        run: |
          ruby <<-'EOF'
          require 'xcodeproj'

          project_path = 'ios/Runner.xcodeproj'
          file_to_add = 'Runner/NodeJSBridge.swift'

          project = Xcodeproj::Project.open(project_path)
          runner_target = project.targets.find { |t| t.name == 'Runner' }
          unless runner_target
            puts "❌ Runner target not found"
            exit 1
          end

          main_group = project.main_group
          runner_group = main_group.groups.find { |g| g.name == 'Runner' || g.path == 'Runner' }
          unless runner_group
            puts "❌ Runner group not found"
            exit 1
          end

          existing_file = runner_group.files.find { |f| f.path == 'NodeJSBridge.swift' }
          if existing_file
            runner_target.source_build_phase.add_file_reference(existing_file) unless runner_target.source_build_phase.files.any? { |bf| bf.file_ref == existing_file }
            puts "✅ NodeJSBridge.swift already exists, ensuring target membership"
          else
            file_ref = runner_group.new_file(File.join(Dir.pwd, 'ios', file_to_add))
            runner_target.source_build_phase.add_file_reference(file_ref)
            puts "✅ Added NodeJSBridge.swift to project"
          end

          project.save
          puts "✅ Project saved"
          EOF
        shell: bash
      - name: Inspect NodeMobile.xcframework
        run: |
         echo "=== 检查 NodeMobile.xcframework 内容 ==="
         FRAMEWORK_PATH="ios/Frameworks/NodeMobile.xcframework/ios-arm64/NodeMobile.framework"
    
         echo "1. 查看二进制文件信息："
         file "$FRAMEWORK_PATH/NodeMobile"
    
         echo "2. 列出框架内的头文件："
         ls -la "$FRAMEWORK_PATH/Headers/" || echo "无 Headers 目录"
    
         echo "3. 查看 Swift 模块文件："
         ls -la "$FRAMEWORK_PATH/Modules/" || echo "无 Modules 目录"
    
         echo "4. 导出 Objective-C 类列表："
         nm -g "$FRAMEWORK_PATH/NodeMobile" | grep "OBJC_CLASS_\$_" | sed 's/.*OBJC_CLASS_\$_//' | sort -u
    
         echo "5. 导出所有符号（过滤相关符号）："
         nm -g "$FRAMEWORK_PATH/NodeMobile" | grep -i "node\|channel\|message" | head -20
     
      - name: Install iOS Pods
        run: |
          echo "=== 安装 CocoaPods ==="
          cd ios
          pod install --repo-update
          cd ..

      - name: Build TVBox (TrollStore)
        run: |
          echo "=== 使用 Flutter 构建完整 .app ==="
          # 确保 Flutter 依赖已安装
          flutter pub get
          
          # 构建 Release 版本的 .app (无签名，适合 TrollStore)
          flutter build ios --release --no-codesign
          
          # 验证生成的 Runner.app
          APP_PATH="./build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ Flutter 构建失败：未找到 Runner.app"
            exit 1
          fi
          
          # 检查二进制文件大小（Flutter 引擎应大于 40MB）
          BIN_SIZE=$(ls -l "$APP_PATH/Runner" | awk '{print $5}')
          echo "Runner 二进制大小: $BIN_SIZE 字节"
          if [ "$BIN_SIZE" -lt 40000000 ]; then
            echo "❌ 错误：二进制文件过小 ($BIN_SIZE)，Flutter 引擎未正确嵌入"
            exit 1
          fi
          
          echo "=== 打包 TrollStore IPA ==="
          mkdir -p ./Build
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          cd "$TEMP_DIR"
          zip -r "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPA 已生成: ./Build/tvbox-Flutter-TrollStore.ipa"
          ls -lh ./Build/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: ./Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./ios/build.log
          retention-days: 7
