name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code (disable LFS)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CocoaPods and xcodeproj
        run: |
          gem install cocoapods
          gem install xcodeproj

      - name: Clean ALL Build Directories
        run: |
          echo "=== 深度清理构建目录 ==="
          flutter clean
          cd ios
          rm -rf Pods Podfile.lock Build Intermediates.noindex DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cd ..
          rm -rf build/
          rm -rf ios/build/
          rm -rf Build/
          echo "✅ 清理完成"

      - name: Download NodeMobile.xcframework
        run: |
          echo "=== 下载 NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          cd ios/Frameworks
          rm -rf NodeMobile.xcframework nodejs-mobile.zip
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o nodejs-mobile.zip "$DOWNLOAD_URL"
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          if [ ! -d "NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework 未找到"
            exit 1
          fi
          echo "✅ 下载完成"
          cd ../..

      - name: Build Node.js Project
        run: |
          echo "=== 构建 Node.js 运行时 ==="
          cd ios/Runner/nodejs-project
          npm install
          npm run build
          cd ../../..
          echo "✅ Node.js打包完成"
          ls -la ios/Runner/nodejs-project/dist/

          echo "=== 准备Node.js Bundle ==="
          mkdir -p ios/Runner/Resources
          cp -r ios/Runner/nodejs-project/dist/* ios/Runner/Resources/
          ls -la ios/Runner/Resources/

      - name: Install Flutter Dependencies
        run: |
          echo "=== 安装 Flutter 依赖 ==="
          flutter pub get

      - name: Configure Xcode Project for TrollStore
        run: |
          ruby << 'RUBYEOF'
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          runner_target = project.targets.find { |t| t.name == 'Runner' }
          unless runner_target
            puts "❌ Runner target not found"
            exit 1
          end

          runner_target.build_configurations.each do |config|
            config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
            config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
            config.build_settings['CODE_SIGN_IDENTITY'] = ''
            config.build_settings['DEVELOPMENT_TEAM'] = ''
            config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
            config.build_settings['PROVISIONING_PROFILE'] = ''
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = ''
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.example.tvboxFlutter'
          end

          main_group = project.main_group
          runner_group = main_group.groups.find { |g| g.name == 'Runner' || g.path == 'Runner' }

          ['NodeJSBridge.swift', 'NodeJSManager.h', 'NodeJSManager.m'].each do |filename|
            file_ref = runner_group.files.find { |f| f.path == filename }
            unless file_ref
              file_ref = runner_group.new_file(filename)
              puts "✅ Added #{filename}"
            end
            if filename.end_with?('.swift', '.m')
              runner_target.source_build_phase.add_file_reference(file_ref) unless runner_target.source_build_phase.files.any? { |bf| bf.file_ref == file_ref }
            end
          end

          resources_path = 'Resources'
          resources_ref = runner_group.files.find { |f| f.path == resources_path }
          unless resources_ref
            resources_ref = runner_group.new_group('Resources', resources_path)
            puts "✅ Added Resources group"
          end

          copy_phase = runner_target.resources_build_phase
          copy_phase.add_file_reference(resources_ref) unless copy_phase.files.any? { |bf| bf.file_ref == resources_ref }

          project.save
          puts "✅ Project saved with TrollStore configuration"
          RUBYEOF

      - name: Install iOS Pods
        run: |
          echo "=== 安装 CocoaPods ==="
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build TVBox with xcodebuild
        run: |
          echo "=== 直接使用 xcodebuild 构建 ==="

          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR="../build" \
            CONFIGURATION_BUILD_DIR="../build/Release-iphoneos" \
            -quiet \
            clean build > ../ios/xcodebuild.log 2>&1

          BUILD_EXIT_CODE=$?
          cd ..

          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ xcodebuild failed with exit code: $BUILD_EXIT_CODE"
            echo "=== xcodebuild 错误日志 (最后100行) ==="
            tail -n 100 ios/xcodebuild.log
            exit 1
          else
            echo "✅ xcodebuild 构建成功"
            echo "=== 构建产物路径 ==="
            tail -n 20 ios/xcodebuild.log | grep -E "CompileSwift|Linking|Build|SUCCEEDED"
          fi

      - name: Verify .app Bundle
        run: |
          APP_PATH="./build/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 构建失败：未找到 Runner.app"
            echo "查找构建产物..."
            ls -la build/
            ls -la build/ios/ 2>/dev/null || true
            ls -la build/Release-iphoneos/ 2>/dev/null || true
            exit 1
          fi

          echo "✅ 找到 .app bundle，大小: $(du -sh "$APP_PATH" | cut -f1)"
          ls -la "$APP_PATH"

      - name: Clean and Fix App Bundle
        run: |
          APP_PATH="./build/Release-iphoneos/Runner.app"

          echo "=== 清理并修复 .app bundle ==="

          chmod +x "$APP_PATH/Runner"

          echo "删除签名文件..."
          rm -rf "$APP_PATH/_CodeSignature"
          rm -rf "$APP_PATH/CodeResources"
          rm -rf "$APP_PATH/embedded.mobileprovision"

          echo "创建正确的 Info.plist..."
          /usr/libexec/PlistBuddy -c "Delete :CFBundleDevelopmentRegion" "$APP_PATH/Info.plist" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleDevelopmentRegion string zh-Hans" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName TvBoxFlutter" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Runner" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.example.tvboxFlutter" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName TvBoxFlutter" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.4.0" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$APP_PATH/Info.plist"

          echo "=== 验证最终 Info.plist ==="
          plutil -lint "$APP_PATH/Info.plist"
          if [ $? -ne 0 ]; then
            echo "❌ Info.plist 验证失败！"
            exit 1
          fi

          echo "✅ Info.plist 验证成功"
          echo "Bundle ID: $(/usr/libexec/PlistBuddy -c "Get :CFBundleIdentifier" "$APP_PATH/Info.plist")"
          echo "Display Name: $(/usr/libexec/PlistBuddy -c "Get :CFBundleDisplayName" "$APP_PATH/Info.plist")"

          echo -e "\n=== 最终 .app 结构 ==="
          ls -la "$APP_PATH"

      - name: Build TrollStore IPA
        run: |
          APP_PATH="./build/Release-iphoneos/Runner.app"

          echo "=== 构建 TrollStore IPA ==="
          mkdir -p ./Build
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          cd "$TEMP_DIR"

          zip -r -q -X "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"

          if [ ! -f "./Build/tvbox-Flutter-TrollStore.ipa" ]; then
            echo "❌ IPA 构建失败！"
            exit 1
          fi

          echo "✅ IPA 已成功生成: ./Build/tvbox-Flutter-TrollStore.ipa"
          echo "IPA 大小: $(du -sh ./Build/tvbox-Flutter-TrollStore.ipa | cut -f1)"
          echo -e "\n=== IPA 内容 ==="
          unzip -l ./Build/tvbox-Flutter-TrollStore.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: ./Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./ios/xcodebuild.log
            ./build/ios/*.log
          retention-days: 7
