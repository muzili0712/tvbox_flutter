name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code (disable LFS)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install CocoaPods and xcodeproj
        run: |
          gem install cocoapods
          gem install xcodeproj

      - name: Clean iOS Build Directory
        run: |
          echo "=== 清理构建目录以避免 Stale file 警告 ==="
          flutter clean
          cd ios
          rm -rf Pods Podfile.lock Build Intermediates.noindex DerivedData
          # 清理 Xcode DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData
          cd ..
          echo "✅ 清理完成"

      - name: Download NodeMobile.xcframework
        run: |
          echo "=== 下载 NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          cd ios/Frameworks
          rm -rf NodeMobile.xcframework nodejs-mobile.zip
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o nodejs-mobile.zip "$DOWNLOAD_URL"
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          if [ ! -d "NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework 未找到"
            exit 1
          fi
          echo "✅ 下载完成"
          cd ../..

      - name: Build Node.js Project
        run: |
          echo "=== 构建 Node.js 运行时 ==="
          cd nodejs-project
          npm install
          npm run build
          cd ..
          echo "✅ 打包完成"
          ls -la nodejs-project/dist/

      - name: Install Flutter Dependencies & Generate JSON Code
        run: |
          echo "=== 安装 Flutter 依赖 ==="
          flutter pub get
          echo "=== 生成 JSON 序列化代码 ==="
          dart run build_runner build --delete-conflicting-outputs || echo "Build runner completed with warnings"

      - name: Add NodeJSBridge and NodeJSManager to Xcode project
        run: |
          ruby <<-'EOF'
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          runner_target = project.targets.find { |t| t.name == 'Runner' }
          unless runner_target
            puts "❌ Runner target not found"
            exit 1
          end
          main_group = project.main_group
          runner_group = main_group.groups.find { |g| g.name == 'Runner' || g.path == 'Runner' }
          unless runner_group
            puts "❌ Runner group not found"
            exit 1
          end
          
          # 添加 NodeJSBridge.swift
          swift_file = runner_group.files.find { |f| f.path == 'NodeJSBridge.swift' }
          if swift_file.nil?
            swift_file = runner_group.new_file('NodeJSBridge.swift')
            puts "✅ Added NodeJSBridge.swift"
          else
            puts "✅ NodeJSBridge.swift already exists"
          end
          runner_target.source_build_phase.add_file_reference(swift_file) unless runner_target.source_build_phase.files.any? { |bf| bf.file_ref == swift_file }
          
          # 添加 NodeJSManager.h
          h_file = runner_group.files.find { |f| f.path == 'NodeJSManager.h' }
          if h_file.nil?
            h_file = runner_group.new_file('NodeJSManager.h')
            puts "✅ Added NodeJSManager.h"
          else
            puts "✅ NodeJSManager.h already exists"
          end
          
          # 添加 NodeJSManager.m
          m_file = runner_group.files.find { |f| f.path == 'NodeJSManager.m' }
          if m_file.nil?
            m_file = runner_group.new_file('NodeJSManager.m')
            puts "✅ Added NodeJSManager.m"
          else
            puts "✅ NodeJSManager.m already exists"
          end
          runner_target.source_build_phase.add_file_reference(m_file) unless runner_target.source_build_phase.files.any? { |bf| bf.file_ref == m_file }
          
          project.save
          puts "✅ Project saved"
          EOF
        shell: bash

      - name: Install iOS Pods
        run: |
          echo "=== 安装 CocoaPods ==="
          cd ios
          # 确保在 pod install 之前没有残留的构建文件
          rm -rf build Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build TVBox (TrollStore)
        run: |
          echo "=== 配置 Xcode 项目 ==="
          
          # 设置 CODE_SIGNING_REQUIRED = NO
          /usr/libexec/PlistBuddy -c "Set :BuildSettings:CODE_SIGNING_REQUIRED NO" ios/Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :BuildSettings:CODE_SIGN_IDENTITY ''" ios/Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          
          echo "=== 使用 Flutter 构建完整 .app ==="
          flutter build ios --release --no-codesign --no-tree-shake-icons 2>&1 | tee ios/build.log || {
            BUILD_EXIT_CODE=$?
            echo "❌ Flutter build failed with exit code: $BUILD_EXIT_CODE"
            echo "=== 显示最后 100 行错误日志 ==="
            tail -n 100 ios/build.log
            echo "=== 尝试使用 xcodebuild ==="
            
            # 备用方案：使用 xcodebuild
            cd ios
            xcodebuild -workspace Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -sdk iphoneos \
              -arch arm64 \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              ONLY_ACTIVE_ARCH=NO \
              BUILD_DIR="../build/ios" \
              CONFIGURATION_BUILD_DIR="../build/ios/iphoneos" 2>&1 | tee ../ios/xcodebuild.log
            XCODE_EXIT_CODE=$?
            cd ..
            
            if [ $XCODE_EXIT_CODE -ne 0 ]; then
              echo "❌ xcodebuild also failed with exit code: $XCODE_EXIT_CODE"
              echo "=== xcodebuild 错误日志 ==="
              cat ios/xcodebuild.log || true
              exit 1
            fi
          }
          
          APP_PATH="./build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 构建失败：未找到 Runner.app"
            ls -la build/ios/ || true
            exit 1
          fi
          
          echo "✅ Flutter 构建成功，.app 大小: $(du -sh "$APP_PATH" | cut -f1)"
          
          chmod +x "$APP_PATH/Runner"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Runner" "$APP_PATH/Info.plist" 2>/dev/null || true
          
          echo "=== 打包 TrollStore IPA ==="
          mkdir -p ./Build
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          cd "$TEMP_DIR"
          zip -r "$GITHUB_WORKSPACE/Build/tvbox-Flutter-TrollStore.ipa" Payload
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPA 已生成: ./Build/tvbox-Flutter-TrollStore.ipa"
          ls -lh ./Build/

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Flutter-TrollStore
          path: ./Build/tvbox-Flutter-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./ios/build.log
            ./ios/xcodebuild.log
            ./build/ios/*.log
          retention-days: 7
