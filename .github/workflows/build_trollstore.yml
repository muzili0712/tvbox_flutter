name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Download and Setup NodeMobile.xcframework
        run: |
          set -e
          echo "=== Downloading NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip"
          curl -L -o ios/Frameworks/nodejs-mobile.zip "$DOWNLOAD_URL"
          cd ios/Frameworks
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          cd ../..
          
          if [ ! -d "ios/Frameworks/NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework not found"
            exit 1
          fi
          
          echo "✅ NodeMobile.xcframework downloaded"

      - name: Build Node.js Project
        run: |
          set -e
          echo "=== Building Node.js project ==="
          cd ios/Runner/nodejs-project
          
          if [ ! -d "node_modules" ]; then
            npm install 2>&1 | tail -3
          fi
          
          node build-optimized.js 2>&1 || node build.js 2>&1
          
          if [ -d "dist" ] && [ -f "dist/index.js" ]; then
            cp dist/index.js dist/main.js
            echo "✅ Node.js build successful"
          fi

      - name: Build iOS App
        run: |
          set -e
          echo "=== Building iOS app ==="
          
          # First, get Flutter dependencies (this creates Generated.xcconfig)
          flutter pub get
          
          cd ios
          pod install --repo-update
          
          cd ..
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Prepare IPA
        id: prepare
        run: |
          echo "=== Preparing IPA ==="
          
          # Find the app bundle
          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ App bundle not found"
            exit 1
          fi
          
          echo "Found app: $APP_PATH"
          
          # Clean all signature files
          rm -rf "$APP_PATH/_CodeSignature"
          rm -rf "$APP_PATH/embedded.mobileprovision"
          rm -rf "$APP_PATH/CodeResources" 2>/dev/null || true
          
          # Fix Info.plist
          PLIST="$APP_PATH/Info.plist"
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.example.tvboxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleName TvBoxFlutter" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.4.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$PLIST"
          
          if ! /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$PLIST" > /dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST"
          fi
          
          echo "✅ Info.plist configured"
          
          # Create IPA
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          mkdir -p Build
          cd "$TEMP_DIR"
          zip -r -q -X "$GITHUB_WORKSPACE/Build/TvBoxFlutter.ipa" Payload
          
          echo "✅ IPA created"
          ls -lh "$GITHUB_WORKSPACE/Build/TvBoxFlutter.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TvBoxFlutter-TrollStore
          path: Build/TvBoxFlutter.ipa
          retention-days: 30
